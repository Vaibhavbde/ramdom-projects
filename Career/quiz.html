<body>
  <!-- Header -->
  <div id="header-placeholder"></div>

  <main id="main-content"></main>
    <!-- Quiz Section -->
    <section class="quiz-section">
      <div class="quiz-header">
        <h2> Career Aptitude Test</h2>
        <p>Take a short quiz and discover which stream & career suits you best ðŸš€</p>
      </div>

      <div id="quiz-container">

        <div id="quiz-start" class="quiz-box">
          <p>Answer a few questions and we'll recommend the best stream & careers for you </p>
          <button id="quiz-begin-btn" class="btn-primary">Start Quiz</button>
        </div>

        <!-- Question Box -->
        <div id="quiz-question" class="quiz-box hidden">
          <p id="question-progress" class="quiz-progress"></p>
          <h3 id="question-text"></h3>
          <div id="options-list" class="options-list"></div>

          <div class="quiz-nav">
            <button id="prev-btn" class="btn-secondary hidden">Prev</button>
            <button id="next-btn" class="btn-primary">Next</button>
          </div>
        </div>

        <!-- Result Box -->
        <div id="quiz-result" class="quiz-box hidden">
          <h3>Your Quiz is Complete! ðŸŽ‰</h3>
          <p id="result-summary"></p>

        </div>
      </div>
    </section>
  </main>
