<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Career Buddy -Skill Development</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


</head>
<body>
  <!-- Header -->
  <div id="header-placeholder"></div>

  <!-- Main content -->
  <main id="main-content">
    <section class="skills-section">
      <div class="skills-header">
        <h2>🛠Skill Development</h2>
        <p>Short-term courses and bootcamps that get you job-ready — compare duration, outcomes & costs.</p>
      </div>

      <div class="skills-controls">
        <div class="skills-search">
          <input id="skill-search-input" type="search" placeholder="Search skills, tools or providers..." />
          <button id="skill-search-btn" class="btn-primary">Search</button>
        </div>

        <div class="skills-filters">
          <select id="skill-level-filter">
            <option value="">All levels</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>

          <select id="skill-mode-filter">
            <option value="">All modes</option>
            <option value="Online">Online</option>
            <option value="Offline">Offline</option>
            <option value="Hybrid">Hybrid</option>
          </select>
        </div>
      </div>

      <div id="skills-list" class="skills-list" aria-live="polite">
        <!-- skill-card items rendered here -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>
  <div id="modal-placeholder"></div>

  <script id="omnidimension-web-widget" async src="https://backend.omnidim.io/web_widget.js?secret_key=47c1909efec41f43899aa106773978ef" ></script> <script src="/js/app.js"></script>

  <!-- include site scripts -->
  <script src="/js/app.js"></script>
  <script src="/js/skills.js"></script>
  <script src="/js/storage.js"></script>
</body>
</html>
